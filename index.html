<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>مرجع البنود</title>
  <meta name="theme-color" content="#0f62fe" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <div class="logo">ب</div>
      <div>
        <h1>مرجع البنود</h1>
        <p>بحث • إضافة • تعديل • حذف</p>
      </div>
    </div>
    <button id="installBtn" class="iconBtn" hidden>تثبيت</button>
  </header>

  <main class="page">
    <section class="panel searchPanel">
      <div class="searchBox">
        <input id="q" type="text" placeholder="ابحث بالاسم أو رقم البند..." class="input" />
      </div>

      <div class="toolbar">
        <select id="filterRate" class="input select">
          <option value="">كل الفئات</option>
          <option value="5%">5%</option>
          <option value="10%">10%</option>
          <option value="25%">25%</option>
        </select>

        <button id="addNewTop" class="btn primary">إضافة صنف</button>
      </div>

      <div class="actionsGrid">
        <label class="btn soft fileBtn">
          <input id="xlsxFile" type="file" accept=".xlsx,.xls" hidden />
          استيراد Excel
        </label>

        <button id="exportJson" class="btn soft">تصدير JSON</button>

        <label class="btn soft fileBtn">
          <input id="jsonFile" type="file" accept=".json" hidden />
          استيراد JSON
        </label>

        <button id="clearAll" class="btn dangerSoft">مسح الكل</button>
      </div>

      <div class="note">
        الاستيراد من Excel يدعم الأعمدة: <b>الصنف</b>، <b>البند</b>، <b>الفئة</b>، <b>السعر (USD)</b>.
      </div>
    </section>

    <section class="panel statsPanel">
      <div class="statsRow">
        <span>عدد النتائج: <b id="count">0</b></span>
        <span class="muted">يتم الحفظ تلقائيًا على هذا الجهاز</span>
      </div>
    </section>

    <section class="panel listPanel">
      <div id="cards" class="cards"></div>

      <div class="tableWrap">
        <table class="table">
          <thead>
            <tr>
              <th>الصنف</th>
              <th>البند</th>
              <th>الفئة</th>
              <th>السعر (USD)</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <button id="fabAdd" class="fab" aria-label="إضافة صنف">＋</button>

  <div id="modal" class="modal" hidden>
    <div class="modalSheet">
      <div class="modalHead">
        <div>
          <h2 id="modalTitle">إضافة صنف</h2>
          <p>أدخل الاسم والبند والفئة والسعر</p>
        </div>
        <button id="closeModal" class="iconClose">✕</button>
      </div>

      <div class="formGrid">
        <div class="field full">
          <label>اسم الصنف</label>
          <input id="fName" class="input" placeholder="مثال: أواني منزلية" />
        </div>

        <div class="field">
          <label>رقم البند</label>
          <input id="fCode" class="input" inputmode="numeric" placeholder="39249000" />
        </div>

        <div class="field">
          <label>الفئة</label>
          <select id="fRate" class="input select">
            <option value="">اختر</option>
            <option value="5%">5%</option>
            <option value="10%">10%</option>
            <option value="25%">25%</option>
          </select>
        </div>

        <div class="field full">
          <label>السعر (USD)</label>
          <input id="fPrice" class="input" inputmode="decimal" placeholder="مثال: 120" />
        </div>
      </div>

      <div id="msg" class="msg" hidden></div>

      <div class="modalActions">
        <button id="saveItem" class="btn primary grow">حفظ</button>
        <button id="deleteItem" class="btn dangerSoft" hidden>حذف</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.20.3/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
